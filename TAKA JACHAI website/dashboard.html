<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taka Jachai - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="min-h-screen">
        <div class="px-5 pt-12 pb-6 flex items-center justify-between">
            <button class="back-btn w-10 h-10 rounded-xl bg-white/10 border border-white/15 flex items-center justify-center text-white" onclick="window.location.href='index.html'">
                ←
            </button>
            <h1 class="text-white text-xl font-black">Dashboard</h1>
            <div class="w-10"></div>
        </div>
        <div class="px-5 max-w-md mx-auto text-center">
            <div class="glass-card p-8">
                <div class="text-6xl mb-4">🏦</div>
                <h2 class="text-white text-xl font-bold">Welcome to Taka Jachai</h2>
                <p class="text-white/60 mt-2">Your banknote authentication assistant</p>
                <button class="mt-6 bg-teal-500 text-white px-6 py-3 rounded-xl font-semibold w-full">Start New Scan</button>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
